# ── Dashboard API 进程配置 ───────────────────────────────────────────
# Dashboard API 面向数据/配置维护，不持有 AgentManager，只通过 AgentClient
# 调用 Agent 服务。这里放服务监听和 API 自身日志配置。
# local / test / prod 是固定 profile 名称；同级 settings.local.yaml、
# settings.test.yaml、settings.prod.yaml 会按当前 profile 自动覆盖本文件。

# 默认 profile。可通过环境变量 RPG_WORLD_PROFILE 覆盖。
default_profile: local

# 所有 profile 共享的默认值。
base:
  # ── Dashboard API 监听配置 ───────────────────────────────────────
  service:
    # 监听地址。
    host: 127.0.0.1
    # 监听端口。
    port: 8000
    # API 路由前缀。
    api_prefix: /dashboard_api/v1
    # 是否启用 uvicorn reload。
    reload: false

  # ── API 日志配置 ────────────────────────────────────────────────
  logging:
    # Python 日志级别：当前阶段默认打开 DEBUG，便于排查 API / AgentClient / 上下文问题。
    log_level: DEBUG
    # FileWatcher 标准库 logger 级别。
    watcher_log_level: DEBUG
    # rpg_core manager 标准库 logger 级别。
    manager_log_level: DEBUG
    # 是否记录用户输入和助手输出。
    log_chat_messages: true
    # 是否记录 LLM token / 耗时统计。
    log_llm_stats: true
    # 日志文件路径；null 表示只输出到 stderr。
    log_path: null

# 固定 profile 名称；覆盖文件无需在这里声明 file。
profiles:
  local: {}
  test: {}
  prod: {}
