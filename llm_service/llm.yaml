# ── LLM Provider 配置 ───────────────────────────────────────────────
# 业务代码只通过 biz_key 获取 provider，不直接读取 YAML key。
# local / test / prod 是固定 profile 名称；同级 llm.local.yaml、
# llm.test.yaml、llm.prod.yaml 会按当前 profile 自动覆盖本文件。

# 默认 profile。可通过环境变量 RPG_WORLD_PROFILE 覆盖。
default_profile: local

# 所有 profile 共享的默认值。
base:
  # ── llama.cpp 托管子进程运行参数 ─────────────────────────────────
  runtime:
    # 是否启用统一 llama 子进程。
    llama_process_enabled: true
    # 单次 llama 子进程请求超时，单位毫秒。
    llama_request_timeout_ms: 60000
    # llama 子进程启动等待超时，单位毫秒。
    llama_startup_timeout_ms: 120000
    # 子进程内最多同时保留/调度的模型实例数。
    llama_max_parallel_models: 2

  # ── 可供业务选择的 LLM provider 池 ───────────────────────────────
  providers:
    # 主 Agent 与子 Agent 共用的 OpenAI-compatible 模型。
    deepseek_v4_flash:
      provider: openai
      openai:
        # OpenAI-compatible 模型名。
        model: deepseek-v4-flash
        # 明文 API Key；不推荐提交真实值。
        api_key: null
        # 从环境变量读取 API Key。
        api_key_env: OPENAI_API_KEY_LOCAL
        # OpenAI-compatible base_url；官方 OpenAI 可留空。
        base_url: https://api.deepseek.com
        # 模型上下文窗口；用于 WebUI context 用量估算，不参与 provider 请求参数。
        context_window: 1000000
        # 最大输出 token；null 表示使用 provider 默认值。
        max_tokens: null
        # 采样温度；null 表示使用 provider 默认值。
        temperature: null

    # 记忆向量嵌入模型。
    qwen_embedding_0_6b:
      provider: llama
      llama:
        # GGUF 模型路径，相对项目根目录解析。
        model_path: data/models/Qwen3-Embedding-0.6B-f16.gguf
        # llama.cpp 上下文窗口。
        n_ctx: 32768
        # GPU offload 层数；0 表示 CPU。
        n_gpu_layers: 0
        # embedding 模型线程数。
        n_threads: 4
        # 是否输出 llama.cpp verbose 日志。
        verbose: false
        # 单次 embedding 请求超时，单位毫秒。
        request_timeout_ms: 60000

    # 记忆查询规划模型。
    memory_query_planner:
      provider: llama
      llama:
        # GGUF 模型路径；留空表示回退规则规划器。
        model_path: ""
        # 查询规划 prompt 上下文窗口。
        n_ctx: 2048
        # GPU offload 层数；0 表示 CPU。
        n_gpu_layers: 0
        # 查询规划建议使用确定性输出。
        temperature: 0.0
        # 查询规划最大输出 token。
        max_tokens: 512
        # 单次查询规划请求超时，单位毫秒。
        request_timeout_ms: 60000

    # 记忆重排模型。
    memory_rerank:
      provider: llama
      llama:
        # GGUF rerank 模型路径；留空表示该能力不可用。
        model_path: ""
        # rerank prompt 最大上下文窗口。
        n_ctx: 4096
        # GPU offload 层数；0 表示 CPU。
        n_gpu_layers: 0
        # logits rerank 不采样，保留为 0。
        temperature: 0.0
        # chat_pointwise 兼容路径使用；logits rerank 不生成文本。
        max_tokens: 32
        # 单次 rerank 请求超时，单位毫秒。
        request_timeout_ms: 60000
        # 是否输出 llama.cpp verbose 日志。
        verbose: false

  # ── 业务键到 provider 池的路由 ───────────────────────────────────
  biz:
    # 主 Agent 对话模型。
    agent.main:
      kind: chat
      provider_key: deepseek_v4_flash

    # 状态子 Agent 复用主 Agent provider。
    agent.status_sub_agent:
      kind: chat
      provider_key: deepseek_v4_flash

    # 记忆子 Agent 复用主 Agent provider。
    agent.memory_sub_agent:
      kind: chat
      provider_key: deepseek_v4_flash

    # 记忆向量嵌入模型。
    memory.embed:
      kind: embedding
      provider_key: qwen_embedding_0_6b

    # 记忆查询规划模型。
    memory.query_planner:
      kind: planner
      provider_key: memory_query_planner

    # 记忆重排模型。
    memory.rerank:
      kind: rerank
      provider_key: memory_rerank
      # 必填：rerank 模型/评分协议，允许 qwen3_logit / chat_pointwise。
      rerank_model_type: qwen3_logit

# 固定 profile 名称；覆盖文件无需在这里声明 file。
profiles:
  local: {}
  test: {}
  prod: {}
