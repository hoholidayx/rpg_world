default_profile: local

base:
  service:
    host: 127.0.0.1
    port: 8012
    api_prefix: /llm/v1
    reload: false

  auth:
    # 环境变量缺失时使用 llm_client.auth 中共享的本地默认 token，并记录 warning。
    token_env: RPG_WORLD_LLM_SERVICE_TOKEN

  runtime:
    llama_max_parallel_models: 2
    llama_shutdown_grace_ms: 5000

  logging:
    log_level: DEBUG

profiles:
  local: {}
  test: {}
  prod: {}
