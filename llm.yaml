# ── RPG World LLM 统一配置文件 ─────────────────────────────────────────
# 业务代码只认 biz_key，不再直接知道底层是 OpenAI 还是 llama.cpp。
# 通过环境变量 RPG_WORLD_PROFILE 选择环境（优先于 default_profile）。
# 支持 base + profiles 合并：profiles.{env} 可通过 file 引入本地覆盖文件。
# 敏感字段可通过 api_key_env 从环境变量读取，避免把密钥写入仓库。
# ─────────────────────────────────────────────────────────────────────────

# ── 默认环境名（可通过 RPG_WORLD_PROFILE 环境变量覆盖） ────────────────
default_profile: "local"

# ── Base 层：所有环境共享的 LLM 默认配置 ──────────────────────────────
base:
  # ── llama.cpp 托管子进程运行参数 ───────────────────────────────────
  runtime:
    # 是否启用统一 llama 子进程；关闭后本地 llama provider 请求会失败
    llama_process_enabled: true
    # 单次 llama 子进程请求超时（毫秒）
    llama_request_timeout_ms: 60000
    # llama 子进程启动等待超时（毫秒）
    llama_startup_timeout_ms: 120000
    # llama 子进程内最多同时保留/调度的模型实例数
    llama_max_parallel_models: 2

  # ── 业务键到 LLM provider 的路由 ───────────────────────────────────
  # kind 可选：chat / embedding / planner / rerank。
  # provider 可选：openai / llama / shared。
  # shared 表示继承 shared_from 指定业务键的 provider 配置，并可局部覆盖。
  biz:
    # 主 Agent 对话模型
    agent.main:
      kind: chat
      provider: openai
      openai:
        # OpenAI 兼容接口模型名
        model: deepseek-v4-flash
        # 直接填写 API Key；不推荐提交真实密钥
        api_key: null
        # 从环境变量读取 API Key；api_key 为空时生效
        api_key_env: OPENAI_API_KEY_LOCAL
        # OpenAI 兼容接口 base_url；官方 OpenAI 可留空
        base_url: https://api.deepseek.com
        # 最大输出 token；null 表示交给 provider 默认值
        max_tokens: null
        # 采样温度；null 表示交给 provider 默认值
        temperature: null

    # 状态子 Agent 默认复用主 Agent 模型
    agent.status_sub_agent:
      kind: chat
      provider: shared
      shared_from: agent.main

    # 记忆子 Agent 默认复用主 Agent 模型
    agent.memory_sub_agent:
      kind: chat
      provider: shared
      shared_from: agent.main

    # 记忆向量嵌入模型；业务代码通过 memory.embed 获取 provider
    memory.embed:
      kind: embedding
      provider: llama
      llama:
        # GGUF 模型路径，相对 rpg_world 包根目录解析
        model_path: data/models/Qwen3-Embedding-0.6B-f16.gguf
        # llama.cpp 上下文窗口
        n_ctx: 32768
        # GPU offload 层数；0 表示 CPU
        n_gpu_layers: 0
        # embedding 模型线程数
        n_threads: 4
        # 是否输出 llama.cpp verbose 日志
        verbose: false
        # 单次 embedding 请求超时（毫秒）
        request_timeout_ms: 60000

    # 记忆查询规划模型；用于把用户查询改写成检索计划
    memory.query_planner:
      kind: planner
      provider: llama
      llama:
        # GGUF 模型路径；留空表示该能力不可用并回退规则规划器
        model_path: ""
        # 查询规划 prompt 的上下文窗口
        n_ctx: 2048
        # GPU offload 层数；0 表示 CPU
        n_gpu_layers: 0
        # 查询规划建议使用确定性输出
        temperature: 0.0
        # 查询规划最大输出 token
        max_tokens: 512
        # 单次查询规划请求超时（毫秒）
        request_timeout_ms: 60000

    # 记忆重排模型；用于给候选记忆输出 0..1 相关性分数
    memory.rerank:
      kind: rerank
      provider: llama
      # 必填：声明 rerank 模型/评分协议。
      # qwen3_logit：本地 llama/Qwen3 reranker，读取 yes/no logits 打分。
      # chat_pointwise：OpenAI chat 模型按 prompt 输出数字的兼容路径。
      rerank_model_type: qwen3_logit
      llama:
        # GGUF rerank 模型路径；例如 Qwen3-Reranker 的 GGUF 文件
        model_path: ""
        # rerank prompt 的最大上下文窗口，同时用于截断候选文档
        n_ctx: 4096
        # GPU offload 层数；0 表示 CPU
        n_gpu_layers: 0
        # logits rerank 不采样，保留为 0
        temperature: 0.0
        # chat_pointwise 兼容路径使用；logits rerank 不生成文本
        max_tokens: 32
        # 单次 rerank 请求超时（毫秒）
        request_timeout_ms: 60000
        # 是否输出 llama.cpp verbose 日志
        verbose: false

# ── Profiles：各环境的增量 LLM 配置 ───────────────────────────────────
# file 模式适合存放本地模型路径、API Key、base_url 等敏感或机器相关配置。
# 对应文件默认可缺失；需要强制存在时可使用 { file: xxx.yaml, required: true }。
profiles:
  local:
    file: "llm.local.yaml"

  test:
    file: "llm.test.yaml"

  prod:
    file: "llm.prod.yaml"
