# ── RPG World 统一配置文件 ──────────────────────────────────────────────
# 通过环境变量 RPG_WORLD_PROFILE 选择环境（默认 local）。
# 支持 base + profiles 合并：profiles.{env} 递归覆盖 base。
# 敏感字段可通过 api_key_env / token_env 从环境变量读取，优先级：
#   显式参数 > YAML 直接值 > YAML env 引用（os.environ）
# ─────────────────────────────────────────────────────────────────────────

# ── Base 层：所有环境共享的默认配置 ────────────────────────────────────
base:
  # ── Agent 业务配置（非 LLM 选型） ──────────────────────────────────
  agent:
    max_tool_call_limit: 10
    include_tool_records: true
    verbose_logging: true

    memory_sub_agent:
      enabled: true
      summary:
        compress_batch_size: 5
        keep_rounds: 5
        compression_enabled: true
      recall:
        max_items: 5
      story:
        trigger_rounds: 0

    status_sub_agent:
      enabled: true

  # ── 数据路径配置（相对于 workspace 根目录） ──────────────────────────
  data:
    # 角色卡 JSON 文件所在子目录
    character_path: "character"
    # 世界书 JSON 文件所在子目录
    lorebook_path: "lorebook"

  # ── 向量记忆配置 ──────────────────────────────────────────────────────
  memory:
    # 是否启用向量记忆索引与检索
    enabled: true
    # 是否启用向量 + 关键词混合检索
    hybrid_enabled: true
    # 混合检索中向量召回候选数
    vector_k: 50
    # 关键词检索 tokenizer：jieba / bigram / both
    keyword_tokenizer: jieba
    # 混合检索中 keyword 召回候选数
    keyword_k: 50
    # raw markdown 召回模式：fallback_only / always / disabled
    raw_md_mode: fallback_only
    # fallback_only 模式下主候选不足触发阈值，0 表示使用当前召回池目标（有 rerank 时为 rerank_candidate_k，否则为 top_k）
    raw_md_min_results: 0
    # 混合评分权重（可调优检索排序）
    # vector: 向量相似度；keyword: 关键词/FTS；raw_md: 原文词项覆盖；exact: 原始查询精确/模糊命中
    # expanded: query planner 扩展查询命中；recency: 时间新近度；granularity: 记忆粒度优先级
    hybrid_vector_weight: 0.47
    hybrid_keyword_weight: 0.18
    hybrid_raw_md_weight: 0.05
    hybrid_exact_weight: 0.10
    hybrid_expanded_weight: 0.10
    hybrid_recency_weight: 0.05
    hybrid_granularity_weight: 0.05
    # 进入 reranker 的混合检索候选数，最终仍只返回 top_k
    rerank_candidate_k: 8
    # LLM 重排分在最终融合分中的权重（剩余权重给混合检索分）
    rerank_score_weight: 0.70

    # 向量检索返回的最大结果数
    top_k: 2
    # jieba 用户词典路径（相对于包根 rpg_world/data/jieba_dict.tx），留空使用默认词典
    jieba_dict: ""
    # 单文件超过此字符数时进行分块
    chunk_size: 2000
    # 分块重叠字符数（保证上下文连续性）
    chunk_overlap: 64

  # ── 模块配置：控制各子系统的启停和参数 ──────────────────────────────
  modules:

    # ── API 模块（FastAPI + WebUI） ───────────────────────────────────
    api:
      # 是否启用 API 服务
      enabled: true
      # 监听地址
      host: "127.0.0.1"
      # 监听端口
      port: 8000
      # 是否开启热重载（开发时建议开启）
      reload: false

    # ── Telegram 模块 ────────────────────────────────────────────────
    telegram:
      # 是否启用 Telegram bot（设为 true 才会启动下方启用的 bot）
      enabled: true
      # 全局访问控制列表（留空或 ["*"] 表示不限制）
      allow_from: ["*"]

      # 多 bot 列表：每个 bot 独立运行、独立 workspace、独立会话
      bots:
        - name: main                          # bot 唯一标识（字母数字下划线）
          enabled: false                      # 是否启用此 bot
          bot_token: null                     # 直接写入 token（不推荐明文存放）
          token_env: "TELEGRAM_BOT_TOKEN_MAIN" # 从环境变量读取 token（推荐）
          workspace: "data/非公开行程"          # 绑定的 workspace 路径
          allow_from: ["*"]                   # 此 bot 的访问控制
          streaming: true                     # 是否启用流式输出（增量编辑消息）
          proxy: "http://127.0.0.1:7890"      # HTTP 代理地址（留空表示不启用）
          stream_edit_interval_ms: 2500        # 流式编辑的最小间隔（毫秒）
          stream_edit_min_chars: 64           # 触发编辑的最小新增字符数
          request_timeout_ms: 5000            # 单次 Telegram API 请求超时（毫秒）

    # ── CLI 模块（交互式命令行 REPL） ─────────────────────────────────
    cli:
      # 是否启用 CLI 入口
      enabled: true
      # 绑定的 workspace 路径（留空则使用 CLI 默认 workspace：data/cli_default_workspace）
      workspace: "data/非公开行程"

# ── 默认环境名（可通过 RPG_WORLD_PROFILE 环境变量覆盖） ────────────────
default_profile: "local"

# ── Profiles：各环境的增量配置 ──────────────────────────────────────────
# 支持三种形式：
#   1. inline:  local: { modules: { api: { port: 9000 } } }
#   2. file:    local: settings.local.yaml
#   3. 混合:   local: { file: settings.local.yaml, modules: { api: { port: 9000 } } }
# file 模式适合存放本地 secrets（settings.local.yaml 应加入 .gitignore）。
# required: true 时文件不存在会抛异常（默认 false 表示文件可缺失）。
profiles:
  local:
    file: "settings.local.yaml"

  test:
    file: "settings.test.yaml"

  prod:
    file: "settings.prod.yaml"
