default_profile: local

base:
  service:
    host: 127.0.0.1
    port: 8011
    api_prefix: /media/v1
    reload: false

  media_client:
    base_url: http://127.0.0.1:8011/media/v1
    request_timeout_ms: 60000

  worker:
    concurrency: 1

  background_worker:
    concurrency: 1

  llm_client:
    base_url: http://127.0.0.1:8012/llm/v1
    token_env: RPG_WORLD_LLM_SERVICE_TOKEN
    request_timeout_ms: 60000
    stream_timeout_ms: 300000

  logging:
    log_level: DEBUG
    directory: logs
    rotation_size_mb: 20
    retention_count: 10
    compression: zip
    console_enabled: true

profiles:
  local: {}
  test: {}
  prod: {}
